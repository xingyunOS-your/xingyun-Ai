<?php
session_start();

// 数据库文件
$user_file = "xingyun.txt";

// 注册
if(isset($_POST['reg'])){
    $u = trim($_POST['username']);
    $p = trim($_POST['password']);
    if($u && $p){
        $exists = false;
        if(file_exists($user_file)){
            $lines = file($user_file, FILE_IGNORE_NEW_LINES);
            foreach($lines as $line){
                $arr = explode("|", $line);
                if($arr[0] == $u) $exists = true;
            }
        }
        if(!$exists){
            file_put_contents($user_file, "$u|$p\n", FILE_APPEND);
            $msg = "✅ 注册成功，请登录";
        }else{
            $msg = "❌ 账号已存在";
        }
    }else{
        $msg = "❌ 账号密码不能为空";
    }
}

// 登录
if(isset($_POST['login'])){
    $u = trim($_POST['username']);
    $p = trim($_POST['password']);
    if(file_exists($user_file)){
        $lines = file($user_file, FILE_IGNORE_NEW_LINES);
        foreach($lines as $line){
            $arr = explode("|", $line);
            if($arr[0] == $u && $arr[1] == $p){
                $_SESSION['user'] = $u;
                header("Location: index.html");
                exit;
            }
        }
        $msg = "❌ 账号或密码错误";
    }else{
        $msg = "❌ 暂无用户，请先注册";
    }
}

// 退出
if(isset($_GET['logout'])){
    session_destroy();
    header("Location: index.html");
    exit;
}

$login_user = $_SESSION['user'] ?? '';
?>

<script>
// 星陨AI 基础对话
const consoleEl = document.getElementById("console");

function addMsg(role, text, cls){
    let div = document.createElement("div");
    div.className = cls;
    div.textContent = role + ": " + text;
    consoleEl.appendChild(div);
    consoleEl.scrollTop = consoleEl.scrollHeight;
}

function send(){
    let text = document.getElementById("msg").value.trim();
    if(!text) return;
    addMsg("你", text, "msg-user");
    document.getElementById("msg").value = "";

    setTimeout(()=>{
        addMsg("星陨AI", "我是星陨AI，正在运行中~", "msg-bot");
    }, 500);
}

// 小游戏
function guess(){ alert("猜数字：1~10，凭感觉猜吧！"); }
function dice(){ alert("骰子点数："+(Math.floor(Math.random()*6)+1)); }
function rps(){
    let user = prompt("输入：石头/剪刀/布");
    let ai = ["石头","剪刀","布"][Math.floor(Math.random()*3)];
    alert("你："+user+"\nAI："+ai);
}
function wheel(){
    let list = ["大吉","中吉","小吉","再来一次"];
    alert("转盘："+list[Math.floor(Math.random()*list.length)]);
}
