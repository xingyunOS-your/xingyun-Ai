<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>星陨AI</title>
<style>
*{box-sizing:border-box}
body{background:#111;color:#fff;margin:0;font-family:system-ui}
.container{max-width:700px;margin:0 auto;padding:10px;height:100vh;display:flex;flex-direction:column}
.header{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0}
.btn{padding:8px 12px;border:none;border-radius:8px;background:#09f;color:#000;font-weight:bold;cursor:pointer}
.btn.sec{background:#222;color:#fff}
.chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:10px 14px;border-radius:14px}
.msg.user{align-self:flex-end;background:#06c}
.msg.ai{align-self:flex-start;background:#282}
.msg.narration{align-self:center;background:#527;font-style:italic}
.msg.char{align-self:flex-start;background:#722}
.input-bar{display:flex;gap:8px;margin-top:10px}
input{flex:1;padding:12px;border-radius:8px;border:none;background:#222;color:#fff}
button{padding:12px 16px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;place-content:center;padding:20px}
.modal-box{background:#1a1a1a;padding:20px;border-radius:12px;max-width:500px;width:100%}
textarea,input{width:100%;margin:6px 0;padding:10px;border-radius:8px;border:none;background:#222;color:#fff}
.ad{color:gold}
</style>

<div class="container">
  <div class="header">
    <button class="btn" id="newChat">新建对话</button>
    <button class="btn sec" id="openSetting">AI设定</button>
    <button class="btn sec" id="openStory">故事模式</button>
  </div>
  <div style="color:#aaa;font-size:14px">
    今日已发：<span id="used">0</span>/20
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <input id="input" placeholder="输入...">
    <button id="send">发送</button>
  </div>
</div>

<!-- 设定弹窗 -->
<div class="modal" id="settingModal">
  <div class="modal-box">
    <h3>AI 设定</h3>
    <input id="aiName" placeholder="AI名称">
    <textarea id="sysPrompt" rows="6" placeholder="系统提示词"></textarea>
    <button id="saveSetting">保存</button>
  </div>
</div>

<!-- 故事创建 -->
<div class="modal" id="storyModal">
  <div class="modal-box">
    <h3>创建故事</h3>
    <input id="storyTitle" placeholder="故事标题">
    <textarea id="worldRule" rows="4" placeholder="世界设定（不可被AI修改）"></textarea>
    <input id="char1" placeholder="角色1">
    <input id="char2" placeholder="角色2">
    <input id="char3" placeholder="角色3">
    <button id="startStory">开始故事</button>
  </div>
</div>

<!-- 广告弹窗 -->
<div class="modal" id="adModal">
  <div class="modal-box ad">
    <h3>📢 观看广告继续</h3>
    <p>第三方广告位</p>
    <button id="closeAd">关闭广告</button>
  </div>
</div>

<script>
// ==============================================
// 你的 API KEY（已经全部写死）
// ==============================================
const API_KEY = "74e60c6fc58c40c39a8cec7bc13eef7b.KoNhMGs94rNnjDOJ";
const API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

// ==============================================
// 本地存储
// ==============================================
const storage = {
  get(k) { return JSON.parse(localStorage.getItem(k)) || null },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)) }
};

// ==============================================
// 全局状态
// ==============================================
let state = storage.get("state") || {
  aiName: "星陨AI",
  prompt: "你是xingyunai，简洁自然对话，记住上下文。",
  today: new Date().toDateString(),
  used: 0,
  limit: 20,
  isStory: false,
  normalHistory: [],
  story: null,
  storyHistory: [],
  storyUserCount: 0
};

// 跨天重置
if (state.today !== new Date().toDateString()) {
  state.today = new Date().toDateString();
  state.used = 0;
  save();
}

function save() { storage.set("state", state); }
function updateUI() { document.getElementById("used").textContent = state.used; }

// ==============================================
// DOM
// ==============================================
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const newChatBtn = document.getElementById("newChat");
const settingModal = document.getElementById("settingModal");
const storyModal = document.getElementById("storyModal");
const adModal = document.getElementById("adModal");

updateUI();

// ==============================================
// 真实 API 请求
// ==============================================
async function callAPI(messages) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "glm-4-flash",
        messages: messages,
        max_tokens: 6000,
        temperature: 0.7
      })
    });
    const data = await res.json();
    return data.choices?.[0]?.message?.content || "无回复";
  } catch (e) {
    return "API 调用失败：" + e.message;
  }
}

// ==============================================
// 聊天渲染
// ==============================================
function renderMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<strong>${role === "user" ? "你" : role === "narration" ? "旁白" : role === "char" ? "角色" : state.aiName}</strong>: ${text}`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function renderAll() {
  chatEl.innerHTML = "";
  const list = state.isStory ? state.storyHistory : state.normalHistory;
  list.forEach(({ role, content }) => renderMsg(role, content));
}

renderAll();

// ==============================================
// 发送逻辑
// ==============================================
async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  // 普通模式：每日20次，只算用户
  if (!state.isStory) {
    if (state.used >= state.limit) {
      alert("今日次数已用完");
      return;
    }
    state.used++;
    save();
    updateUI();
  }

  inputEl.value = "";
  const userMsg = { role: "user", content: text };

  if (state.isStory) {
    // 故事模式
    state.storyUserCount++;
    state.storyHistory.push(userMsg);
    renderMsg("user", text);
    save();

    // 每30句用户弹广告
    if (state.storyUserCount % 30 === 0) {
      adModal.style.display = "grid";
    }

    // 解析 (修改世界)
    const worldEdit = (text.match(/\((.*?)\)/g) || []).map(s => s.slice(1, -1)).join("；");
    const fixedWorld = state.story.worldRule;
    const dynamicWorld = worldEdit ? `【当前世界】${worldEdit}` : "";

    const sys = {
      role: "system",
      content: `
故事背景（不可改）：${fixedWorld}
${dynamicWorld}
要求：
1. 先出【旁白】描述场景、氛围、动作
2. 然后让 ${state.story.char1}、${state.story.char2}、${state.story.char3} 依次对话
3. 自然、连贯、符合人设
4. 不要重复格式
`
    };

    const msgs = [sys, ...state.storyHistory];
    const reply = await callAPI(msgs);

    // 简单拆分旁白 / 角色
    const lines = reply.split("\n").filter(l => l.trim());
    for (const line of lines) {
      if (line.includes("旁白") || line.startsWith("【旁白】")) {
        state.storyHistory.push({ role: "narration", content: line });
        renderMsg("narration", line);
      } else {
        state.storyHistory.push({ role: "char", content: line });
        renderMsg("char", line);
      }
    }
    save();

  } else {
    // 普通对话
    state.normalHistory.push(userMsg);
    renderMsg("user", text);
    const msgs = [
      { role: "system", content: state.prompt },
      ...state.normalHistory
    ];
    const reply = await callAPI(msgs);
    state.normalHistory.push({ role: "assistant", content: reply });
    renderMsg("ai", reply);
    save();
  }
}

sendBtn.addEventListener("click", send);
inputEl.addEventListener("keypress", e => e.key === "Enter" && send());

// ==============================================
// 新建对话
// ==============================================
newChatBtn.addEventListener("click", () => {
  state.isStory = false;
  state.normalHistory = [];
  state.storyHistory = [];
  state.storyUserCount = 0;
  chatEl.innerHTML = "";
  save();
});

// ==============================================
// AI 设定
// ==============================================
document.getElementById("openSetting").onclick = () => {
  document.getElementById("aiName").value = state.aiName;
  document.getElementById("sysPrompt").value = state.prompt;
  settingModal.style.display = "grid";
};
document.getElementById("saveSetting").onclick = () => {
  state.aiName = document.getElementById("aiName").value || "星陨AI";
  state.prompt = document.getElementById("sysPrompt").value || "你是xingyunai。";
  settingModal.style.display = "none";
  save();
};

// ==============================================
// 故事模式
// ==============================================
document.getElementById("openStory").onclick = () => {
  storyModal.style.display = "grid";
};
document.getElementById("startStory").onclick = () => {
  const title = document.getElementById("storyTitle").value.trim();
  const rule = document.getElementById("worldRule").value.trim();
  const c1 = document.getElementById("char1").value.trim();
  const c2 = document.getElementById("char2").value.trim();
  const c3 = document.getElementById("char3").value.trim();

  if (!title || !rule || !c1 || !c2 || !c3) {
    alert("请填完：标题、世界设定、3个角色");
    return;
  }

  state.isStory = true;
  state.story = {
    title,
    worldRule: rule,
    char1: c1,
    char2: c2,
    char3: c3
  };
  state.storyHistory = [];
  state.storyUserCount = 0;
  chatEl.innerHTML = "";
  storyModal.style.display = "none";
  save();
  alert("已进入故事：" + title);
};

// ==============================================
// 广告
// ==============================================
document.getElementById("closeAd").onclick = () => {
  adModal.style.display = "none";
};
</script>
