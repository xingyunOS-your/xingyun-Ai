<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>星陨AI · XINGYUN AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Consolas, monospace;}
body{
background:#0a0a0d;
color:#e0e0e0;
padding:16px;
max-width:800px;
margin:0 auto;
}

/* 顶部科技标题 */
.hero{
text-align:center;
margin-bottom:20px;
}
.hero h1{
font-size:22px;
color:#00ffcc;
text-shadow:0 0 8px #00ffcc;
letter-spacing:2px;
}
.hero p{
color:#888;
font-size:13px;
margin-top:4px;
}

/* 控制台区域 */
.console{
background:#101015;
border:1px solid #2a2a35;
border-radius:10px;
height:66vh;
padding:14px;
overflow-y:auto;
line-height:1.5;
white-space:pre-wrap;
}
.console::-webkit-scrollbar{width:6px;}
.console::-webkit-scrollbar-thumb{background:#2a2a35;border-radius:3px;}

/* 消息样式 */
.msg-user{color:#72aaff;margin:8px 0;}
.msg-bot{color:#00ffcc;margin:8px 0;}
.msg-system{color:#aaa;font-size:12px;margin:8px 0;}

/* 控制面板 */
.control-bar{
display:flex;
gap:8px;
margin-bottom:10px;
}
select{
flex:1;
background:#14141b;
color:#e0e0e0;
border:1px solid #2a2a35;
border-radius:6px;
padding:8px;
outline:none;
}

/* 输入栏 */
.input-box{
display:flex;
gap:8px;
margin-top:10px;
}
input{
flex:1;
background:#14141b;
color:#fff;
border:1px solid #2a2a35;
border-radius:8px;
padding:12px;
outline:none;
font-size:14px;
}
button{
padding:12px 14px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
font-weight:bold;
}
.btn-send{background:#00cc99;}
.btn-clear{background:#2a2a35;color:#ccc;}
</style>
</head>
<body>

<div class="hero">
<h1>[ XINGYUN AI · 星陨AI ]</h1>
<p>超强记忆终端 · 固定标识：I am xingyunai</p>
</div>

<div class="control-bar">
<select id="model">
<option value="glm-4-flash" selected>glm-4-flash</option>
<option value="glm-4">glm-4</option>
<option value="glm-4v">glm-4v</option>
<option value="glm-3-turbo">glm-3-turbo</option>
</select>
<button class="btn-clear" onclick="clearHistory()">清空记忆</button>
</div>

<div class="console" id="console"></div>

<div class="input-box">
<input type="text" id="msg" placeholder=">>> 输入指令..." autocomplete="off" />
<button class="btn-send" onclick="send()">发送</button>
</div>

<script>
const API_KEY = "74e60c6fc58c40c39a8cec7bc13eef7b.KoNhMGs94rNnjDOJ";
const API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

const SYSTEM_PROMPT = `你是星陨AI，代号 xingyunai，拥有完整上下文记忆能力，永远记住所有对话历史。
用户问你名字时，必须只回答：I am xingyunai。
全程用中文交流，只有名字那一句用指定英文。`;

let messages = [
{ role: "system", content: SYSTEM_PROMPT }
];

const consoleEl = document.getElementById("console");
const msgEl = document.getElementById("msg");
const modelEl = document.getElementById("model");

msgEl.addEventListener("keydown", e => {
if (e.key === "Enter") send();
});

function addMsg(role, text, className) {
const div = document.createElement("div");
div.className = className;
div.textContent = role + ": " + text;
consoleEl.appendChild(div);
consoleEl.scrollTop = consoleEl.scrollHeight;
}

async function send() {
const text = msgEl.value.trim();
if (!text) return;

addMsg("你", text, "msg-user");
msgEl.value = "";
messages.push({ role: "user", content: text });

try {
const res = await fetch(API_URL, {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + API_KEY
},
body: JSON.stringify({
model: modelEl.value,
messages: messages,
max_tokens: 65536,
temperature: 0.7
})
});

const data = await res.json();
const reply = data?.choices?.[0]?.message?.content || "请求失败，请检查网络或API";

addMsg("星陨AI", reply, "msg-bot");
messages.push({ role: "assistant", content: reply });

} catch (e) {
addMsg("星陨AI", "连接错误：" + e.message, "msg-bot");
}
}

function clearHistory() {
messages = [{ role: "system", content: SYSTEM_PROMPT }];
consoleEl.innerHTML = "";
addMsg("系统", "对话记忆已清空", "msg-system");
}
</script>
</body>
</html>
