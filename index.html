<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>星陨AI</title>
<style>
*{box-sizing:border-box}
body{background:#111;color:#fff;margin:0;font-family:system-ui}
.container{max-width:700px;margin:0 auto;padding:10px;height:100vh;display:flex;flex-direction:column}
.header{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0}
.btn{padding:8px 12px;border:none;border-radius:8px;background:#00ccff;color:#000;font-weight:bold;cursor:pointer}
.btn.sec{background:#222;color:#fff}
.chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.6}
.msg.user{align-self:flex-end;background:#0066cc;color:#80bfff}
.msg.ai{align-self:flex-start;background:#225522;color:#00ff99}
.msg.narration{align-self:center;background:#552277;color:#d9b3ff;font-style:italic}
.msg.char{align-self:flex-start;background:#772222;color:#ff9999}
.input-bar{display:flex;gap:8px;margin-top:10px}
input{flex:1;padding:14px;border-radius:12px;border:none;background:#222;color:#fff;font-size:16px}
button{padding:14px 20px;border-radius:12px;border:none;font-weight:bold;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;place-content:center;padding:20px}
.modal-box{background:#1a1a1a;padding:20px;border-radius:12px;max-width:500px;width:100%}
textarea,input{width:100%;margin:8px 0;padding:12px;border-radius:8px;border:none;background:#222;color:#fff;font-size:15px}
.char-item{display:flex;gap:8px;align-items:center;margin:6px 0}
.char-item input{flex:1;margin:0}
.del-char{background:#ff4444;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
.ad{color:gold}
</style>

<div class="container">
  <div class="header">
    <button class="btn" id="newChat">新建对话</button>
    <button class="btn sec" id="openSetting">AI设定</button>
    <button class="btn sec" id="openStory">故事模式</button>
  </div>
  <div style="color:#aaa;font-size:14px;padding:4px 0">
    今日已发：<span id="used">0</span>/20
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <input id="input" placeholder="输入...">
    <button id="send">发送</button>
  </div>
</div>

<!-- 设定弹窗 -->
<div class="modal" id="settingModal">
  <div class="modal-box">
    <h3>AI 设定</h3>
    <input id="aiName" placeholder="AI名称" value="星陨AI">
    <textarea id="sysPrompt" rows="6" placeholder="系统提示词">你的名字是xingyunai，用户问你名字必须只回答：I am xingyunai。全程用中文交流，拥有超强上下文记忆，记住所有对话内容，绝不忘记。回答简洁、自然、准确、有礼貌。</textarea>
    <button class="btn" id="saveSetting">保存</button>
    <button class="btn sec" id="cancelSetting">取消</button>
  </div>
</div>

<!-- 故事创建 -->
<div class="modal" id="storyModal">
  <div class="modal-box">
    <h3>创建故事</h3>
    <input id="storyTitle" placeholder="故事标题">
    <textarea id="worldRule" rows="4" placeholder="世界设定（不可被AI修改）"></textarea>
    <label>角色列表（旁白强制存在，至少1个角色）</label>
    <div id="charList">
      <div class="char-item">
        <input type="text" value="旁白" readonly>
        <button class="del-char" disabled>×</button>
      </div>
      <div class="char-item">
        <input type="text" placeholder="角色名称">
        <button class="del-char">×</button>
      </div>
    </div>
    <button class="btn sec" id="addChar">+ 添加角色</button>
    <button class="btn" id="startStory">开始故事</button>
    <button class="btn sec" id="cancelStory">取消</button>
  </div>
</div>

<!-- 广告弹窗 -->
<div class="modal" id="adModal">
  <div class="modal-box ad">
    <h3>📢 观看广告继续</h3>
    <p>第三方广告位（可接入穿山甲/优量汇）</p>
    <button class="btn" id="closeAd">关闭广告</button>
  </div>
</div>

<script>
// ==============================================
// 你的 API KEY（写死）
// ==============================================
const API_KEY = "74e60c6fc58c40c39a8cec7bc13eef7b.KoNhMGs94rNnjDOJ";
const API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

// ==============================================
// 本地存储
// ==============================================
const storage = {
  get(k) { return JSON.parse(localStorage.getItem(k)) || null },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)) }
};

// ==============================================
// 全局状态
// ==============================================
let state = storage.get("state") || {
  aiName: "星陨AI",
  prompt: "你的名字是xingyunai，用户问你名字必须只回答：I am xingyunai。全程用中文交流，拥有超强上下文记忆，记住所有对话内容，绝不忘记。回答简洁、自然、准确、有礼貌。",
  today: new Date().toDateString(),
  used: 0,
  limit: 20,
  isStory: false,
  normalHistory: [],
  story: null,
  storyHistory: [],
  storyUserCount: 0
};

// 跨天重置
if (state.today !== new Date().toDateString()) {
  state.today = new Date().toDateString();
  state.used = 0;
  save();
}

function save() { storage.set("state", state); }
function updateUI() { document.getElementById("used").textContent = state.used; }

// ==============================================
// DOM
// ==============================================
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const newChatBtn = document.getElementById("newChat");
const settingModal = document.getElementById("settingModal");
const storyModal = document.getElementById("storyModal");
const adModal = document.getElementById("adModal");
const charListEl = document.getElementById("charList");

updateUI();

// ==============================================
// 真实 API 请求
// ==============================================
async function callAPI(messages) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "glm-4-flash",
        messages: messages,
        max_tokens: 6000,
        temperature: 0.7
      })
    });
    const data = await res.json();
    return data.choices?.[0]?.message?.content || "无回复";
  } catch (e) {
    return "API 调用失败：" + e.message;
  }
}

// ==============================================
// 聊天渲染
// ==============================================
function renderMsg(role, text, name = "") {
  const div = document.createElement("div");
  let roleName, cls;
  if (role === "user") { roleName = "你"; cls = "user"; }
  else if (role === "narration") { roleName = "旁白"; cls = "narration"; }
  else if (role === "char") { roleName = name || "角色"; cls = "char"; }
  else { roleName = state.aiName; cls = "ai"; }

  div.className = "msg " + cls;
  div.innerHTML = `<strong>${roleName}</strong>: ${text}`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function renderAll() {
  chatEl.innerHTML = "";
  const list = state.isStory ? state.storyHistory : state.normalHistory;
  list.forEach(({ role, content, name }) => renderMsg(role, content, name));
}

renderAll();

// ==============================================
// 发送逻辑
// ==============================================
async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  // 普通模式：每日20次，只算用户
  if (!state.isStory) {
    if (state.used >= state.limit) {
      alert("今日次数已用完");
      return;
    }
    state.used++;
    save();
    updateUI();
  }

  inputEl.value = "";
  const userMsg = { role: "user", content: text };

  if (state.isStory) {
    // 故事模式
    state.storyUserCount++;
    state.storyHistory.push(userMsg);
    renderMsg("user", text);
    save();

    // 每30句用户弹广告
    if (state.storyUserCount % 30 === 0) {
      adModal.style.display = "grid";
    }

    // 解析 (修改世界)
    const worldEdit = (text.match(/\((.*?)\)/g) || []).map(s => s.slice(1, -1)).join("；");
    const fixedWorld = state.story.worldRule;
    const dynamicWorld = worldEdit ? `【用户修改世界：${worldEdit}】` : "";

    // 生成角色列表字符串
    const charNames = state.story.characters.filter(c => c !== "旁白").join("、");
    const charPrompt = charNames ? `让 ${charNames} 依次对话` : "让角色依次对话";

    const sys = {
      role: "system",
      content: `
故事背景（不可修改）：${fixedWorld}
${dynamicWorld}
要求：
1. 先出【旁白】描述场景、氛围、动作
2. ${charPrompt}
3. 自然、连贯、符合人设
4. 每条对话以【角色名】开头
5. 不要重复格式
`
    };

    const msgs = [sys, ...state.storyHistory];
    const reply = await callAPI(msgs);

    // 严格拆分旁白/角色
    const lines = reply.split("\n").filter(l => l.trim());
    for (const line of lines) {
      if (line.includes("旁白") || line.startsWith("【旁白】")) {
        state.storyHistory.push({ role: "narration", content: line });
        renderMsg("narration", line);
      } else {
        // 提取角色名
        const nameMatch = line.match(/【(.*?)】/);
        const charName = nameMatch ? nameMatch[1] : "角色";
        state.storyHistory.push({ role: "char", content: line, name: charName });
        renderMsg("char", line, charName);
      }
    }
    save();

  } else {
    // 普通对话
    state.normalHistory.push(userMsg);
    renderMsg("user", text);
    const msgs = [
      { role: "system", content: state.prompt },
      ...state.normalHistory
    ];
    const reply = await callAPI(msgs);
    state.normalHistory.push({ role: "assistant", content: reply });
    renderMsg("ai", reply);
    save();
  }
}

sendBtn.addEventListener("click", send);
inputEl.addEventListener("keypress", e => e.key === "Enter" && send());

// ==============================================
// 新建对话
// ==============================================
newChatBtn.addEventListener("click", () => {
  state.isStory = false;
  state.normalHistory = [];
  state.storyHistory = [];
  state.storyUserCount = 0;
  chatEl.innerHTML = "";
  save();
  renderAll();
});

// ==============================================
// AI 设定
// ==============================================
document.getElementById("openSetting").onclick = () => {
  document.getElementById("aiName").value = state.aiName;
  document.getElementById("sysPrompt").value = state.prompt;
  settingModal.style.display = "grid";
};
document.getElementById("saveSetting").onclick = () => {
  state.aiName = document.getElementById("aiName").value || "星陨AI";
  state.prompt = document.getElementById("sysPrompt").value || "你是xingyunai。";
  settingModal.style.display = "none";
  save();
};
document.getElementById("cancelSetting").onclick = () => {
  settingModal.style.display = "none";
};

// ==============================================
// 故事模式（自定义角色数量）
// ==============================================
// 添加角色
document.getElementById("addChar").onclick = () => {
  const newItem = document.createElement("div");
  newItem.className = "char-item";
  newItem.innerHTML = `
    <input type="text" placeholder="角色名称">
    <button class="del-char">×</button>
  `;
  charListEl.appendChild(newItem);
  // 绑定删除
  newItem.querySelector(".del-char").onclick = () => {
    charListEl.removeChild(newItem);
  };
};

// 初始化角色列表删除
charListEl.querySelectorAll(".del-char:not([disabled])").forEach(btn => {
  btn.onclick = () => charListEl.removeChild(btn.parentElement);
});

document.getElementById("openStory").onclick = () => {
  // 重置角色列表（保留旁白+1个空角色）
  charListEl.innerHTML = `
    <div class="char-item">
      <input type="text" value="旁白" readonly>
      <button class="del-char" disabled>×</button>
    </div>
    <div class="char-item">
      <input type="text" placeholder="角色名称">
      <button class="del-char">×</button>
    </div>
  `;
  // 绑定删除
  charListEl.querySelectorAll(".del-char:not([disabled])").forEach(btn => {
    btn.onclick = () => charListEl.removeChild(btn.parentElement);
  });
  storyModal.style.display = "grid";
};

document.getElementById("startStory").onclick = () => {
  const title = document.getElementById("storyTitle").value.trim();
  const rule = document.getElementById("worldRule").value.trim();
  const charInputs = charListEl.querySelectorAll("input");
  const characters = Array.from(charInputs).map(i => i.value.trim()).filter(n => n && n !== "旁白");

  if (!title || !rule || characters.length === 0) {
    alert("请填完：标题、世界设定、至少1个角色");
    return;
  }

  state.isStory = true;
  state.story = {
    title,
    worldRule: rule,
    characters: ["旁白", ...characters]
  };
  state.storyHistory = [];
  state.storyUserCount = 0;
  chatEl.innerHTML = "";
  storyModal.style.display = "none";
  save();
  renderAll();
  alert("已进入故事：" + title);
};

document.getElementById("cancelStory").onclick = () => {
  storyModal.style.display = "none";
};

// ==============================================
// 广告
// ==============================================
document.getElementById("closeAd").onclick = () => {
  adModal.style.display = "none";
};

// ==============================================
// 初始化
// ==============================================
updateUI();
renderAll();
</script>
</body>
</html>
